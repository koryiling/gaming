<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MinTeen Arcade 🌿 — Mini Games for Everyone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/styles.css?v=20260625g" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
</head>
<body>
  <!-- ===== Top bar ===== -->
  <header class="topbar" id="topbar" hidden>
    <div class="brand" id="brand-home">
      <span class="brand-logo">🌿</span>
      <span class="brand-name">MinTeen Arcade</span>
    </div>
    <div class="topbar-right">
      <select class="lang-select" id="lang-select" title="Language / Bahasa / 语言" aria-label="Language"></select>
      <span class="user-chip" id="user-chip" title="Click to change name">
        <span class="user-avatar" id="user-avatar">M</span>
        <span class="user-name" id="user-name">Player</span>
      </span>
      <button class="btn ghost small" id="logout-btn" data-i18n="switchUser">Switch user</button>
    </div>
  </header>

  <!-- ===== Login screen ===== -->
  <section class="screen login-screen" id="login-screen">
    <div class="login-card">
      <div class="login-logo">🌿</div>
      <h1>MinTeen Arcade</h1>
      <p class="subtitle" data-i18n="loginSubtitle">10+ mini games. Bring your friends. Pick a name to begin.</p>
      <form id="login-form" autocomplete="off">
        <label for="username-input" data-i18n="usernameLabel">Your username</label>
        <input id="username-input" type="text" maxlength="16" placeholder="e.g. MintNinja" data-i18n-ph="usernamePh" required />
        <p class="hint" id="login-hint"></p>
        <button type="submit" class="btn primary block" data-i18n="enterArcade">Enter the arcade →</button>
      </form>
      <select class="lang-select login-lang" id="lang-select-login" aria-label="Language"></select>
    </div>
    <p class="login-foot" data-i18n="loginFoot">Made for fun • plays on one screen • 1–4 players</p>
  </section>

  <!-- ===== Hub screen ===== -->
  <main class="screen hub-screen" id="hub-screen" hidden>
    <div class="hub-head">
      <div class="hub-title-row">
        <div class="hub-greet">
          <svg class="dino-mascot" viewBox="0 0 100 100" width="74" height="74" aria-hidden="true">
            <polygon points="38,32 44,18 50,32" fill="#2e9d6c"/>
            <polygon points="50,30 58,16 66,30" fill="#2e9d6c"/>
            <path d="M16 70 q-11 0 -13 -11 q13 2 17 7 z" fill="#2e9d6c"/>
            <ellipse cx="55" cy="62" rx="34" ry="28" fill="#43b884"/>
            <circle cx="75" cy="40" r="20" fill="#43b884"/>
            <ellipse cx="52" cy="71" rx="18" ry="15" fill="#bdeccd"/>
            <rect x="40" y="82" width="10" height="15" rx="4" fill="#2e9d6c"/>
            <rect x="61" y="82" width="10" height="15" rx="4" fill="#2e9d6c"/>
            <circle cx="81" cy="36" r="6.5" fill="#fff"/>
            <circle cx="83" cy="37" r="3.2" fill="#173a2b"/>
            <path d="M70 49 q9 6 17 0" stroke="#173a2b" stroke-width="2.2" fill="none" stroke-linecap="round"/>
            <circle cx="91" cy="41" r="1.6" fill="#173a2b"/>
          </svg>
          <h2 id="hub-greet-h">Choose a game, <span id="hub-greet-name">friend</span> 👋</h2>
        </div>
        <button class="btn primary" id="leaderboard-btn" data-i18n="leaderboard">🏆 Leaderboard</button>
      </div>
      <nav class="game-nav" id="game-nav"></nav>
      <div class="hub-controls">
        <input type="search" id="game-search" placeholder="🔍 Search games…" data-i18n-ph="searchPh" />
        <div class="filter-pills" id="filter-pills"></div>
      </div>
    </div>
    <div class="game-grid" id="game-grid"></div>
  </main>

  <!-- ===== Game screen ===== -->
  <section class="screen game-screen" id="game-screen" hidden>
    <div class="game-top">
      <button class="btn ghost" id="back-btn" data-i18n="allGames">← All games</button>
      <h2 id="game-title">Game</h2>
    </div>

    <!-- Setup (rules + options + players) -->
    <div class="setup" id="setup-panel">
      <div class="setup-grid">
        <div class="panel rules-panel">
          <h3 data-i18n="howToPlay">📖 How to play</h3>
          <p class="game-tagline" id="setup-tagline"></p>
          <ul id="rules-list"></ul>
        </div>
        <div class="panel">
          <h3 data-i18n="optionsH">⚙️ Options</h3>
          <div id="options-form" class="options-form"></div>
          <div id="players-block">
            <h3 class="players-h" data-i18n="playersH">👥 Players</h3>
            <div class="player-count" id="player-count-row"></div>
            <div class="player-names" id="player-names"></div>
          </div>
          <button class="btn primary block" id="start-btn" data-i18n="startGame">▶ Start game</button>
        </div>
      </div>
    </div>

    <!-- Live game -->
    <div class="play" id="play-panel" hidden>
      <div class="play-bar">
        <div class="scoreboard" id="scoreboard"></div>
        <div class="play-actions">
          <button class="btn ghost small lb-mobile-only" id="lb-toggle" aria-pressed="true" data-i18n="lbRanks">🏆 Ranks</button>
          <button class="btn ghost small" id="restart-btn" data-i18n="restart">↻ Restart</button>
          <button class="btn ghost small" id="setup-btn" data-i18n="setupBtn">⚙ Setup</button>
        </div>
      </div>
      <div class="record-banner" id="record-banner" hidden></div>
      <div class="turn-banner" id="turn-banner" hidden></div>
      <div class="play-main" id="play-main">
        <div class="board-fit" id="board-fit">
          <div class="board-wrap" id="board"></div>
        </div>
        <aside class="game-lb" id="game-lb">
          <div class="game-lb-head">
            <span class="game-lb-title" id="game-lb-title">🏆 Top 10</span>
            <span class="game-lb-head-btns">
              <button class="btn ghost small" id="game-lb-side" title="Move panel to the other side">⇄</button>
              <button class="btn ghost small lb-mobile-only" id="game-lb-hide" title="Hide leaderboard">✕</button>
            </span>
          </div>
          <div class="lb-scope seg" id="game-lb-scope">
            <button type="button" data-scope="local">📱</button>
            <button type="button" data-scope="global">🌍</button>
          </div>
          <div class="lb-window seg" id="game-lb-window">
            <button type="button" data-w="day" data-i18n="sDay">Day</button>
            <button type="button" data-w="week" data-i18n="sWeek">Week</button>
            <button type="button" data-w="month" data-i18n="sMonth">Month</button>
            <button type="button" data-w="all" data-i18n="sAll">All</button>
          </div>
          <ol class="lb-list" id="game-lb-list"></ol>
        </aside>
      </div>
      <p class="status-line" id="status-line"></p>
    </div>
  </section>

  <!-- ===== Leaderboard modal ===== -->
  <div class="lb-overlay" id="lb-overlay" hidden>
    <div class="lb-modal">
      <div class="lb-head">
        <h2 data-i18n="leaderboardTitle">🏆 Leaderboard</h2>
        <button class="btn ghost small" id="lb-close" data-i18n="close">✕ Close</button>
      </div>
      <div class="lb-controls">
        <div class="lb-game-pills" id="lb-game-pills"></div>
        <button class="btn ghost small" id="lb-clear" data-i18n="clearGame">🗑 Clear this game</button>
      </div>
      <div class="lb-scope seg" id="lb-scope">
        <button type="button" data-scope="local" data-i18n="scopeDevice">📱 This device</button>
        <button type="button" data-scope="global" data-i18n="scopeGlobal">🌍 Global</button>
      </div>
      <div class="lb-window seg" id="lb-window">
        <button type="button" data-w="day" data-i18n="winToday">Today</button>
        <button type="button" data-w="week" data-i18n="winWeek">Week</button>
        <button type="button" data-w="month" data-i18n="winMonth">Month</button>
        <button type="button" data-w="all" data-i18n="winAll">All time</button>
      </div>
      <ol class="lb-list" id="lb-list"></ol>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <!-- Core + games -->
  <script src="js/config.js?v=20260625g"></script>
  <script src="js/i18n-games.js?v=20260625g"></script>
  <script src="js/i18n.js?v=20260625g"></script>
  <script src="js/app.js?v=20260625g"></script>
  <script src="js/touch.js?v=20260625g"></script>
  <script src="js/games/snake.js?v=20260625g"></script>
  <script src="js/games/connectfour.js?v=20260625g"></script>
  <script src="js/games/memory.js?v=20260625g"></script>
  <script src="js/games/rps.js?v=20260625g"></script>
  <script src="js/games/whack.js?v=20260625g"></script>
  <script src="js/games/g2048.js?v=20260625g"></script>
  <script src="js/games/simon.js?v=20260625g"></script>
  <script src="js/games/reaction.js?v=20260625g"></script>
  <script src="js/games/pong.js?v=20260625g"></script>
  <script src="js/games/minesweeper.js?v=20260625g"></script>
  <script src="js/games/hangman.js?v=20260625g"></script>
  <script src="js/games/snakesladders.js?v=20260625g"></script>
  <script src="js/games/tetris.js?v=20260625g"></script>
  <script src="js/games/battleship.js?v=20260625g"></script>
  <script src="js/games/dotsboxes.js?v=20260625g"></script>
  <script src="js/games/yahtzee.js?v=20260625g"></script>
  <script src="js/games/car.js?v=20260625g"></script>
  <script src="js/games/blackjack.js?v=20260625g"></script>
  <script src="js/games/mastermind.js?v=20260625g"></script>
  <script src="js/games/wordmaster.js?v=20260625g"></script>
  <script src="js/games/sudoku.js?v=20260625g"></script>
  <script src="js/games/checkers.js?v=20260625g"></script>
  <script src="js/games/gomoku.js?v=20260625g"></script>
  <script src="js/games/breakout.js?v=20260625g"></script>
  <script src="js/games/flappy.js?v=20260625g"></script>
  <script src="js/games/pig.js?v=20260625g"></script>
  <script src="js/games/numberdetective.js?v=20260625g"></script>
  <script src="js/games/codecrack.js?v=20260625g"></script>
  <script src="js/games/treasurehunt.js?v=20260625g"></script>
  <script src="js/games/higherlower.js?v=20260625g"></script>
  <script src="js/games/crazyeights.js?v=20260625g"></script>
  <script src="js/games/scramble.js?v=20260625g"></script>
  <script src="js/games/wordrecall.js?v=20260625g"></script>
  <script src="js/games/tugofwar.js?v=20260625g"></script>
  <script src="js/games/lightsout.js?v=20260625g"></script>
  <script src="js/games/idiom.js?v=20260625g"></script>
  <script src="js/games/wordsearch.js?v=20260625g"></script>
  <script src="js/games/idiomtype.js?v=20260625g"></script>
  <script src="js/boot.js?v=20260625g"></script>
</body>
</html>
