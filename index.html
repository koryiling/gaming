<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mint Arcade 🌿 — Mini Games for Everyone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
</head>
<body>
  <!-- ===== Top bar ===== -->
  <header class="topbar" id="topbar" hidden>
    <div class="brand" id="brand-home">
      <span class="brand-logo">🌿</span>
      <span class="brand-name">Mint Arcade</span>
    </div>
    <div class="topbar-right">
      <span class="user-chip" id="user-chip" title="Click to change name">
        <span class="user-avatar" id="user-avatar">M</span>
        <span class="user-name" id="user-name">Player</span>
      </span>
      <button class="btn ghost small" id="logout-btn">Switch user</button>
    </div>
  </header>

  <!-- ===== Login screen ===== -->
  <section class="screen login-screen" id="login-screen">
    <div class="login-card">
      <div class="login-logo">🌿</div>
      <h1>Mint Arcade</h1>
      <p class="subtitle">10+ mini games. Bring your friends. Pick a name to begin.</p>
      <form id="login-form" autocomplete="off">
        <label for="username-input">Your username</label>
        <input id="username-input" type="text" maxlength="16" placeholder="e.g. MintNinja" required />
        <p class="hint" id="login-hint"></p>
        <button type="submit" class="btn primary block">Enter the arcade →</button>
      </form>
    </div>
    <p class="login-foot">Made for fun • plays on one screen • 1–4 players</p>
  </section>

  <!-- ===== Hub screen ===== -->
  <main class="screen hub-screen" id="hub-screen" hidden>
    <div class="hub-head">
      <h2>Choose a game, <span id="hub-greet-name">friend</span> 👋</h2>
      <div class="hub-controls">
        <input type="search" id="game-search" placeholder="🔍 Search games…" />
        <div class="filter-pills" id="filter-pills"></div>
      </div>
    </div>
    <div class="game-grid" id="game-grid"></div>
  </main>

  <!-- ===== Game screen ===== -->
  <section class="screen game-screen" id="game-screen" hidden>
    <div class="game-top">
      <button class="btn ghost" id="back-btn">← All games</button>
      <h2 id="game-title">Game</h2>
    </div>

    <!-- Setup (rules + options + players) -->
    <div class="setup" id="setup-panel">
      <div class="setup-grid">
        <div class="panel rules-panel">
          <h3>📖 How to play</h3>
          <p class="game-tagline" id="setup-tagline"></p>
          <ul id="rules-list"></ul>
        </div>
        <div class="panel">
          <h3>⚙️ Options</h3>
          <div id="options-form" class="options-form"></div>
          <div id="players-block">
            <h3 class="players-h">👥 Players</h3>
            <div class="player-count" id="player-count-row"></div>
            <div class="player-names" id="player-names"></div>
          </div>
          <button class="btn primary block" id="start-btn">▶ Start game</button>
        </div>
      </div>
    </div>

    <!-- Live game -->
    <div class="play" id="play-panel" hidden>
      <div class="play-bar">
        <div class="scoreboard" id="scoreboard"></div>
        <div class="play-actions">
          <button class="btn ghost small" id="restart-btn">↻ Restart</button>
          <button class="btn ghost small" id="setup-btn">⚙ Setup</button>
        </div>
      </div>
      <div class="board-wrap" id="board"></div>
      <p class="status-line" id="status-line"></p>
    </div>
  </section>

  <!-- Toast -->
  <div class="toast" id="toast" hidden></div>

  <!-- Core + games -->
  <script src="js/app.js"></script>
  <script src="js/games/snake.js"></script>
  <script src="js/games/tictactoe.js"></script>
  <script src="js/games/connectfour.js"></script>
  <script src="js/games/memory.js"></script>
  <script src="js/games/rps.js"></script>
  <script src="js/games/whack.js"></script>
  <script src="js/games/g2048.js"></script>
  <script src="js/games/simon.js"></script>
  <script src="js/games/reaction.js"></script>
  <script src="js/games/pong.js"></script>
  <script src="js/games/minesweeper.js"></script>
  <script src="js/games/hangman.js"></script>
  <script src="js/boot.js"></script>
</body>
</html>
