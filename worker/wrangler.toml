name = "mint-arcade-leaderboard"
main = "worker.js"
compatibility_date = "2024-10-01"

# KV namespace for storing leaderboard events.
# Create it once with:
#   wrangler kv namespace create LEADERBOARD
# then paste the returned id below (replace PUT_YOUR_KV_NAMESPACE_ID_HERE).
[[kv_namespaces]]
binding = "LEADERBOARD"
id = "PUT_YOUR_KV_NAMESPACE_ID_HERE"
